<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan WebForge Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-base: #0d1117;
            --bg-surface: #161b22;
            --accent-primary: #58a6ff;
            --accent-secondary: #7ee787;
            --glass-border: rgba(255,255,255,0.1);
            --text-main: #e6edf3;
            --spring-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg-base); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* UI Shell */
        .app-container { display: flex; flex-direction: column; height: 100vh; }

        header {
            height: 60px; background: var(--bg-surface);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
        }

        .main-workspace { display: flex; flex: 1; overflow: hidden; }

        /* Left Sidebar: Component Library */
        .sidebar {
            width: 280px; background: var(--bg-surface);
            border-right: 1px solid var(--glass-border);
            padding: 20px; display: flex; flex-direction: column; gap: 10px;
        }

        /* Center Canvas: The Artboard */
        .canvas-area {
            flex: 1; background: #000; display: flex; 
            justify-content: center; align-items: flex-start;
            padding: 60px; overflow: auto; position: relative;
        }

        #artboard {
            width: 1000px; min-height: 600px; background: white;
            border-radius: 4px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: width 0.5s var(--spring-bounce);
        }

        /* Responsive Frames */
        .mobile-view { width: 375px !important; min-height: 812px !important; border: 12px solid #222; border-radius: 40px; }
        .tablet-view { width: 768px !important; min-height: 1024px !important; border: 8px solid #222; border-radius: 20px; }

        /* Component Visuals */
        .btn-titan {
            background: var(--accent-primary); color: white; border: none;
            padding: 12px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;
            transition: 0.2s;
        }
        .btn-titan:hover { opacity: 0.9; transform: translateY(-2px); }

        .block-preview {
            padding: 15px; background: #21262d; border: 1px solid var(--glass-border);
            border-radius: 8px; cursor: grab; font-size: 13px; text-align: center;
        }

        /* Draggable Elements on Canvas */
        .canvas-element {
            position: absolute; color: black; padding: 10px; cursor: move;
            user-select: none; border: 2px solid transparent;
        }
        .canvas-element:hover { border: 2px dashed var(--accent-primary); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div style="font-weight: 800; font-size: 20px; color: var(--accent-primary);">TITAN WEBFORGE</div>
        <div class="toolbar">
            <button class="btn-titan" onclick="toggleView('desktop')"><i class="fa-solid fa-desktop"></i></button>
            <button class="btn-titan" onclick="toggleView('tablet')"><i class="fa-solid fa-tablet-screen-button"></i></button>
            <button class="btn-titan" onclick="toggleView('mobile')"><i class="fa-solid fa-mobile-screen"></i></button>
        </div>
        <button class="btn-titan" style="background: var(--accent-secondary); color: #000;" onclick="deploySite()">DEPLOY LIVE</button>
    </header>

    <div class="main-workspace">
        <aside class="sidebar">
            <div style="font-size: 11px; color: #8b949e; text-transform: uppercase;">Components</div>
            <div class="block-preview" onclick="addComponent('h1')">Main Heading</div>
            <div class="block-preview" onclick="addComponent('p')">Text Block</div>
            <div class="block-preview" onclick="addComponent('button')">Action Button</div>
            <div class="block-preview" onclick="addComponent('img')">Image Frame</div>
        </aside>

        <main class="canvas-area">
            <div id="artboard">
                </div>
        </main>
    </div>
</div>

<script>
    // CORE LOGIC ENGINE
    function toggleView(mode) {
        const artboard = document.getElementById('artboard');
        artboard.className = ''; // Reset
        if (mode === 'mobile') artboard.classList.add('mobile-view');
        if (mode === 'tablet') artboard.classList.add('tablet-view');
    }

    function addComponent(type) {
        const artboard = document.getElementById('artboard');
        const el = document.createElement(type === 'button' ? 'button' : 'div');
        
        el.className = 'canvas-element';
        el.style.left = '50px';
        el.style.top = '50px';
        
        if (type === 'h1') el.innerText = 'New Heading';
        else if (type === 'p') el.innerText = 'Click to drag this paragraph.';
        else if (type === 'button') {
            el.innerText = 'Action Button';
            el.style.background = '#007bff';
            el.style.color = 'white';
            el.style.border = 'none';
            el.style.borderRadius = '5px';
        }
        else if (type === 'img') {
            el.innerHTML = '<img src="https://via.placeholder.com/150" width="150">';
        }

        // Enable Dragging (Movable Logic)
        makeDraggable(el);
        artboard.appendChild(el);
    }

    function makeDraggable(el) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        el.onmousedown = dragMouseDown;

        function dragMouseDown(e) {
            e.preventDefault();
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
        }

        function elementDrag(e) {
            pos1 = pos3 - e.clientX;
            pos2 = pos4 - e.clientY;
            pos3 = e.clientX;
            pos4 = e.clientY;
            el.style.top = (el.offsetTop - pos2) + "px";
            el.style.left = (el.offsetLeft - pos1) + "px";
        }

        function closeDragElement() {
            document.onmouseup = null;
            document.onmousemove = null;
        }
    }

    function deploySite() {
        alert("Billion-Dollar Site is being pushed to the Cloud Edge!\n\nStatus: 100% SUCCESS.\nYour HONORX7B preview is now live.");
    }
</script>

</body>
</html>
