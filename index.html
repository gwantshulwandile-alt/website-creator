        :root {

            --accent-secondary: #7ee787;   /* Success Green */
            --accent-vivid: #bc8cff;       /* AI Purple */
            --accent-danger: #ff7b72;      /* Error Red */

            /* Glassmorphism Specification [Ref: 1000043224.jpg] */
            --glass-alpha: rgba(13, 17, 23, 0.7);
            --glass-border: rgba(240, 246, 252, 0.1);
            --glass-blur: blur(20px) saturate(180%);

            --font-main: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;

            --step-5: clamp(2.49rem, 2.02vw + 1.98rem, 3.58rem); /* Billion Dollar Headers */

            /* Hardware Acceleration */
            --gpu-transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --spring-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);

        /* RESET ENGINE (Lines 451 - 700)

        */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;

            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            cursor: default;

        body {
            background-color: var(--bg-base);
            color: #e6edf3;
            font-family: var(--font-main);
            overflow: hidden; /* Prevent native scroll "bouncing" like TikTok */

            transition: transform 0.2s var(--spring-bounce);

<script>
    /**
     * VIRTUAL FILE SYSTEM ENGINE (Lines 1400 - 2000)
     * Handles directory traversal and recursive pathing.
     */
    class VirtualFileSystem {
        constructor() {
            this.root = {
                id: 'root',
                name: 'Phone',
                type: 'directory',
                children: [
                    { id: 'dir_1', name: 'MyWebsites', type: 'directory', children: [] },
                    { id: 'dir_2', name: 'CloudAssets', type: 'directory', children: [] },
                    { id: 'dir_3', name: 'SystemLogs', type: 'directory', children: [] }
                ]
            };
            this.history = ['root'];
            this.currentFolder = this.root;
        }

        // Billion-dollar path finding logic (Recursive)
        findNodeById(id, current = this.root) {
            if (current.id === id) return current;
            if (current.children) {
                for (const child of current.children) {
                    const found = this.findNodeById(id, child);
                    if (found) return found;
                }
            }
            return null;
        }

        navigateTo(folderId) {
            const target = this.findNodeById(folderId);
            if (target && target.type === 'directory') {
                this.currentFolder = target;
                this.history.push(folderId);
                this.renderVFS();
            }
        }

        renderVFS() {
            const target = document.getElementById('vfs-render-target');
            if (!target) return;

            // Logic to render "No Content" [Ref: 1000043130.jpg]
            if (this.currentFolder.children.length === 0) {

                            This directory is empty. Connect your <strong>HONORX7B</strong> or upload assets to begin building.
                        </p>
                    </div>
                `;
            }
        }
    }

<script>
    /**
     * BUILDER KERNEL (Lines 2400 - 3000)
     * Handles coordinate transformations and DOM manipulation.
     */
    class MagicBuilder {
        constructor() {
            this.activeElement = null;
            this.zoomLevel = 1.0;
            this.snapSize = 10;
            this.isDragging = false;
            this.dragStart = { x: 0, y: 0 };
        }

        /**
         * The Math behind the "Magic": Snapping to Grid.
         * Formula: $P_{snapped} = \lfloor P_{actual} / S \rfloor \times S$
         */
        snap(value) {
            return Math.round(value / this.snapSize) * this.snapSize;
        }

        selectElement(el) {
            if (this.activeElement) this.activeElement.classList.remove('element-selected');
            this.activeElement = el;
            el.classList.add('element-selected');
            this.updatePropertyPanel(el);
            this.log('Builder', `Selected component: ${el.tagName}`);
        }

        // Billion-Dollar Interaction Logic: Dragging elements
        initDrag(e, el) {
            this.isDragging = true;
            this.activeElement = el;
            const rect = el.getBoundingClientRect();
            this.dragStart = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };

            const move = (moveEvent) => this.handleDrag(moveEvent);
            const stop = () => {
                this.isDragging = false;
                window.removeEventListener('mousemove', move);
                window.removeEventListener('mouseup', stop);
            };

            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
        }

        handleDrag(e) {
            if (!this.isDragging || !this.activeElement) return;
            
            const artboardRect = document.getElementById('artboard').getBoundingClientRect();
            
            let x = e.clientX - artboardRect.left - this.dragStart.x;
            let y = e.clientY - artboardRect.top - this.dragStart.y;

            // Apply Precision Snapping
            this.activeElement.style.left = `${this.snap(x)}px`;
            this.activeElement.style.top = `${this.snap(y)}px`;
            this.activeElement.style.position = 'absolute';
        }

        updatePropertyPanel(el) {
            const panel = document.getElementById('props-render');
            if (!panel) return;
            
            panel.innerHTML = `
                <div class="prop-row">
                    <label class="nav-group-label">Dimensions</label>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <input type="text" class="prop-input" value="W: ${el.offsetWidth}px">
                        <input type="text" class="prop-input" value="H: ${el.offsetHeight}px">
                    </div>
                </div>
                <div class="prop-row">
                    <label class="nav-group-label">Opacity</label>
                    <input type="range" min="0" max="100" class="prop-input">
                </div>
            `;
        }
    }

<script>
    /**

     */
    class PropertyInspector {
        constructor() {
            this.currentSelection = null;
        }

        /**
         * Real-time CSS Injection
         * Billion-dollar apps use direct style mutation for maximum speed.
         */
        applyStyle(property, value, unit = '') {
            if (!Builder.activeElement) return;
            
            // The "Magic" Link: Update the DOM element instantly
            Builder.activeElement.style[property] = `${value}${unit}`;
            
            // Log the change for the Undo/Redo history (Section 7)
            this.logUpdate(property, value);
        }

        renderInspector(el) {
            const panel = document.getElementById('props-render');
            if (!panel) return;

            // Computed Style Retrieval
            const styles = window.getComputedStyle(el);

            panel.innerHTML = `
                <div class="inspector-header">
                    <span style="font-weight:700; font-size:14px;">Edit ${el.tagName}</span>
                    <span class="text-sm" style="color:var(--accent-vivid)">#${el.id.slice(-4)}</span>

                        <span class="text-sm">Opacity</span>

                    <div class="prop-row" style="margin-top:15px;">
                        <span class="text-sm">Border Radius</span>

                    <label class="control-label">Layout (Spacing)</label>

                        <input type="text" class="prop-input" placeholder="L" onchange="Inspector.applyStyle('marginLeft', this.value, 'px')">
                    </div>

        }

        rgbToHex(rgb) {
            if (!rgb || rgb === 'rgba(0, 0, 0, 0)') return '#ffffff';
            const res = rgb.match(/\d+/g);
            return res ? "#" + res.slice(0, 3).map(x => {
                const hex = parseInt(x).toString(16);
                return hex.length === 1 ? "0" + hex : hex;
            }).join("") : "#ffffff";
        }

        logUpdate(p, v) {
            console.log(`%c[STYLE] %c${p} set to ${v}`, "color: #bc8cff", "color: #fff");
        }

<script>
    /**
     * CHRONOS STATE ENGINE (Lines 6400 - 7000)
     * Implements the Command Pattern for non-destructive editing.
     */
    class ChronosEngine {
        constructor() {
            this.undoStack = [];
            this.redoStack = [];
            this.maxHistory = 100; // Enterprise limit
            this.initShortcuts();
        }

        /**
         * The "Billion Dollar" Capture
         * Instead of saving the whole page, we save the Delta (the change).
         */
        record(actionType, element, oldValue, newValue) {
            const command = {
                id: Date.now(),
                type: actionType,
                targetId: element.id,
                oldValue: oldValue,
                newValue: newValue
            };

            this.undoStack.push(command);
            if (this.undoStack.length > this.maxHistory) this.undoStack.shift();
            
            // Clear redo stack on new action (Standard Pro UX)
            this.redoStack = []; 
            this.showToast(`Action: ${actionType}`);
            this.updateActivityLog();
        }

        undo() {
            if (this.undoStack.length === 0) return;
            const command = this.undoStack.pop();
            this.redoStack.push(command);

            this.applyCommand(command, 'undo');
            this.showToast("Undo Successful", true);
        }

        redo() {
            if (this.redoStack.length === 0) return;
            const command = this.redoStack.pop();
            this.undoStack.push(command);

            this.applyCommand(command, 'redo');
            this.showToast("Redo Successful", true);
        }

        applyCommand(cmd, mode) {
            const element = document.getElementById(cmd.targetId);
            if (!element) return;

            const val = (mode === 'undo') ? cmd.oldValue : cmd.newValue;
            
            // Apply logic based on type (Position, Style, Content)
            if (cmd.type === 'MOVE') {
                element.style.left = val.x;
                element.style.top = val.y;
            } else {
                element.style[cmd.type] = val;
            }
            
            // Refresh Inspector if this element is selected
            if (Builder.activeElement === element) Inspector.renderInspector(element);
        }

        initShortcuts() {
            window.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                    e.preventDefault();
                    this.undo();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'y') {
                    e.preventDefault();
                    this.redo();
                }
            });
        }

        showToast(msg, isSystem = false) {
            const toast = document.getElementById('system-toast');
            toast.innerHTML = `${msg} <span class="shortcut-hint">${isSystem ? 'SYS' : 'CTRL+Z'}</span>`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        updateActivityLog() {
            // Logic to populate a hidden activity drawer
            console.log(`[CHRONOS] Stack Depth: ${this.undoStack.length}`);
        }
    }

    const Chronos = new ChronosEngine();

    /* HOOKING INTO KERNEL:
       We update the Builder's MOVE logic to record the drag start and end.
    */
    const originalDragStart = Builder.initDrag;
    Builder.initDrag = function(e, el) {
        const startPos = { x: el.style.left, y: el.style.top };
        
        // Listen for the drop to record the history
        const recordDrop = () => {
            const endPos = { x: el.style.left, y: el.style.top };
            if (startPos.x !== endPos.x || startPos.y !== endPos.y) {
                Chronos.record('MOVE', el, startPos, endPos);
            }
            window.removeEventListener('mouseup', recordDrop);
        };
        
        window.addEventListener('mouseup', recordDrop);
        originalDragStart.call(Builder, e, el);
    };
</script>

                name: file.name,

<script>
    /**
     * OMNI-SEARCH KERNEL (Lines 10400 - 11000)
     * Implements fuzzy-string matching and system-wide indexing.
     */
    class OmniSearch {
        constructor() {
            this.isOpen = false;
            this.selectedIndex = 0;
            this.index = [];
            this.initShortcuts();
        }

        /**
         * The "Billion Dollar" Indexer
         * Scans the VFS (Section 2) and Factory (Section 5) to create a flat search map.
         */
        rebuildIndex() {
            this.index = [
                // System Commands
                { title: 'New Website', type: 'COMMAND', action: () => OS.nav('builder') },
                { title: 'Connect Device', type: 'COMMAND', action: () => OS.nav('network') },
                { title: 'Clear History', type: 'COMMAND', action: () => Chronos.undoStack = [] },
                
                // Content from VFS
                ...VFS.root.children.map(f => ({ title: f.name, type: 'FILE', action: () => VFS.navigateTo(f.id) })),
                
                // Components from Factory
                ...Object.keys(Factory.registry).map(k => ({ 
                    title: Factory.registry[k].name, 
                    type: 'COMPONENT', 
                    action: () => Factory.spawnComponent(k) 
                }))
            ];
        }

        handleSearch(query) {
            if (!query) return this.renderResults([]);
            
            // "Fuzzy" Match Logic
            const results = this.index.filter(item => 
                item.title.toLowerCase().includes(query.toLowerCase())
            ).slice(0, 8); // Top 8 results for billion-dollar speed

            this.renderResults(results);
        }

        renderResults(results) {
            const container = document.getElementById('omni-results-target');
            if (results.length === 0) {
                container.innerHTML = `<div style="padding:20px; text-align:center; color:var(--n-500)">No matches found...</div>`;
                return;
            }

            container.innerHTML = results.map((res, i) => `
                <div class="search-result-item ${i === this.selectedIndex ? 'selected' : ''}" 
                     onclick="Omni.execute('${res.title}')">
                    <span>${res.title}</span>
                    <span class="result-meta">${res.type}</span>
                </div>
            `).join('');
        }

        execute(title) {
            const item = this.index.find(i => i.title === title);
            if (item) {
                item.action();
                this.toggle();
            }
        }

        toggle() {
            const overlay = document.getElementById('omni-box');
            this.isOpen = !this.isOpen;
            overlay.style.display = this.isOpen ? 'flex' : 'none';
            if (this.isOpen) {
                this.rebuildIndex();
                document.getElementById('omni-input').focus();
            }
        }

        initShortcuts() {
            window.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    this.toggle();
                }
                if (this.isOpen && e.key === 'Escape') this.toggle();
            });
        }
    }

    const Omni = new OmniSearch();
</script>

<script>
    /**
     * GEOMETRIC ENGINE (Lines 11400 - 12000)
     * Handles real-time collision detection and snapping math.
     */
    class LayoutEngine {
        constructor() {
            this.threshold = 8; // Pixels to trigger snap
            this.activeGuides = [];
        }

        /**
         * The "Billion Dollar" Snap Math
         * Calculates proximity to Artboard center and sibling elements.
         */
        calculateSnapping(x, y, width, height) {
            const artboard = document.getElementById('artboard');
            const centerX = artboard.offsetWidth / 2;
            const centerY = artboard.offsetHeight / 2;
            
            let snappedX = x;
            let snappedY = y;
            this.clearGuides();

            // Center Snapping Logic
            if (Math.abs((x + width / 2) - centerX) < this.threshold) {
                snappedX = centerX - width / 2;
                this.showGuide('v', centerX);
            }

            if (Math.abs((y + height / 2) - centerY) < this.threshold) {
                snappedY = centerY - height / 2;
                this.showGuide('h', centerY);
            }

            return { x: snappedX, y: snappedY };
        }

        showGuide(type, pos) {
            const guide = document.createElement('div');
            guide.className = type === 'v' ? 'smart-guide-v' : 'smart-guide-h';
            
            if (type === 'v') {
                guide.style.left = `${pos}px`;
                guide.style.top = '0';
                guide.style.height = '100%';
            } else {
                guide.style.top = `${pos}px`;
                guide.style.left = '0';
                guide.style.width = '100%';
            }

            document.getElementById('artboard').appendChild(guide);
            this.activeGuides.push(guide);
        }

        clearGuides() {
            this.activeGuides.forEach(g => g.remove());
            this.activeGuides = [];
        }

        // Global Alignment Functions
        alignSelected(mode) {
            const el = Builder.activeElement;
            if (!el) return;

            const parent = document.getElementById('artboard');
            const oldPos = { x: el.style.left, y: el.style.top };

            if (mode === 'center-h') {
                el.style.left = `${(parent.offsetWidth - el.offsetWidth) / 2}px`;
            } else if (mode === 'center-v') {
                el.style.top = `${(parent.offsetHeight - el.offsetHeight) / 2}px`;
            }

            Chronos.record('ALIGN', el, oldPos, { x: el.style.left, y: el.style.top });
        }
    }

    const Layout = new LayoutEngine();

    // Integrating with Section 3's Builder move logic
    const originalMoveLogic = Builder.handleDrag;
    Builder.handleDrag = function(e) {
        if (!this.isDragging || !this.activeElement) return;
        
        const artboardRect = document.getElementById('artboard').getBoundingClientRect();
        let x = e.clientX - artboardRect.left - this.dragStart.x;
        let y = e.clientY - artboardRect.top - this.dragStart.y;

        // Apply Layout Engine Snapping
        const result = Layout.calculateSnapping(x, y, this.activeElement.offsetWidth, this.activeElement.offsetHeight);
        
        this.activeElement.style.left = `${result.x}px`;
        this.activeElement.style.top = `${result.y}px`;
        this.activeElement.style.position = 'absolute';
    };

    // Clean up guides on mouse up
    window.addEventListener('mouseup', () => Layout.clearGuides());
</script>

<script>
    /**
     * DATA KERNEL (Lines 15400 - 16000)
     * Handles Asynchronous Fetching and Reactive UI updates.
     */
    class DataEngine {
        constructor() {
            this.activeSource = 'https://api.webforge.io/v1/mock-products';
            this.registry = new Map(); // Maps Element IDs to Data Keys
        }

        /**
         * The "Billion Dollar" Hydration
         * Automatically populates design elements with real data.
         */
        async syncData() {
            console.log(`%c[DATA] Initiating API Handshake...`, "color: #bc8cff");
            this.showLoading(true);

            try {
                // Simulated API Fetch from external node
                const response = await fetch(this.activeSource);
                const data = await response.json();
                
                this.registry.forEach((key, elementId) => {
                    const el = document.getElementById(elementId);
                    if (el && data[key]) {
                        el.innerText = data[key];
                        this.applyPulseEffect(el);
                    }
                });
            } catch (e) {
                console.warn("[DATA] Link Offline: Using Local Mock Data.");
                this.useLocalMock();
            } finally {
                this.showLoading(false);
            }
        }

        bind(element, dataKey) {
            const id = element.id || `el_${Date.now()}`;
            element.id = id;
            this.registry.set(id, dataKey);
            
            // Add a visual "Data Chip" so the user knows it's dynamic
            element.insertAdjacentHTML('beforebegin', `<span class="data-chip">🔗 ${dataKey}</span>`);
            this.syncData();
        }

        renderBindingControls() {
            const panel = document.getElementById('props-render');
            if (!panel || !Builder.activeElement) return;

            const dataHtml = `
                <div class="binding-menu">

                        <span class="api-status-dot"></span> Live Connection Verified
                    </div>
                </div>
            `;
            panel.insertAdjacentHTML('beforeend', dataHtml);
        }

        useLocalMock() {
            const mock = { product_name: "Titan Ultra Pro", price_usd: "$999", stock_count: "24" };
            this.registry.forEach((key, id) => {
                const el = document.getElementById(id);
                if (el) el.innerText = mock[key];
            });
        }

        showLoading(isLoading) {
            const toast = document.getElementById('system-toast');
            if (isLoading) {
                toast.innerHTML = `Hydrating Data Layers...`;
                toast.classList.add('show');
            } else {
                toast.classList.remove('show');
            }
        }

        applyPulseEffect(el) {
            el.style.transition = "color 0.5s ease";
            el.style.color = "var(--accent-secondary)";
            setTimeout(() => el.style.color = "", 1000);
        }
    }

    const Data = new DataEngine();

                element.classList.add('input-invalid');
                if (hint) hint.style.display = 'block';

                element.classList.remove('input-invalid');

    class InteractionLab {

        }

        /**
         * The "Billion Dollar" Interaction Bridge
         * Instead of static CSS, we generate dynamic style blocks for "Hover" states.
         */
        registerStateChange(elementId, property, value) {
            if (!this.registry.has(elementId)) {
                this.registry.set(elementId, { hover: {}, active: {} });
            }

            const stateData = this.registry.get(elementId);
            stateData[this.activeState][property] = value;
            
            this.compileInteractionStyles(elementId);
            this.showInteractionToast(property, value);
        }

        compileInteractionStyles(elementId) {
            const data = this.registry.get(elementId);
            let styleTag = document.getElementById(`style-${elementId}`);
            
            if (!styleTag) {
                styleTag = document.createElement('style');
                styleTag.id = `style-${elementId}`;
                document.head.appendChild(styleTag);

            // High-End Logic: Convert Registry to valid CSS Pseudo-classes
            const hoverRules = Object.entries(data.hover)
                .map(([prop, val]) => `${this.camelToKebab(prop)}: ${val} !important;`)
                .join(' ');

            styleTag.innerHTML = `
                #${elementId}:hover { 
                    ${hoverRules} 
                    transition: all 0.3s var(--spring-bounce);
                }
            `;
        }

        setState(state) {
            this.activeState = state;

    class LayerTreeEngine {
        constructor() {
            this.treeTarget = null;
        }

        /**
         * The "Billion Dollar" Re-stacking
         * Moves an element to the front or back of its container.
         */
        reorder(element, direction) {
            const parent = element.parentNode;
            if (direction === 'up' && element.previousElementSibling) {
                parent.insertBefore(element, element.previousElementSibling);
            } else if (direction === 'down' && element.nextElementSibling) {
                parent.insertBefore(element.nextElementSibling, element);
            }
            
            this.sync();
            Chronos.record('REORDER', element, 'position', direction);
        }

        toggleVisibility(id) {

<script>
    /**
     * ROUTING KERNEL (Lines 26400 - 27000)
     * Manages the internal sitemap and cross-page referencing.
     */
    class NavEngine {
        constructor() {
            this.pages = [
                { id: 'home', name: 'Home', path: '/index.html' },
                { id: 'about', name: 'About Us', path: '/about.html' },
                { id: 'shop', name: 'Store', path: '/shop.html' }
            ];
        }

        /**
         * The "Billion Dollar" Linker
         * Automatically updates a component to act as a functional hyperlink.
         */
        linkElement(element, pageId) {
            const page = this.pages.find(p => p.id === pageId);
            if (!page) return;

            // Transform element into a functional 'A' tag equivalent
            element.dataset.linkType = 'internal';
            element.dataset.route = page.path;
            element.style.cursor = 'pointer';

            this.showLinkToast(page.name);
            
            // Highlight the connection in the UI
            element.style.outline = '2px solid var(--accent-primary)';
            setTimeout(() => element.style.outline = '', 1000);
        }

        renderLinkPanel() {
            const panel = document.getElementById('props-render');
            if (!panel || !Builder.activeElement) return;

            const linkHtml = `
                <div class="link-manager-card">
                    <label class="control-label" style="color:var(--accent-primary)">Navigation Link</label>
                    <div style="margin-top:10px;">
                        ${this.pages.map(p => `
                            <div class="route-item" onclick="Nav.linkElement(Builder.activeElement, '${p.id}')">
                                <i class="fa-solid fa-link"></i>
                                <span>${p.name}</span>
                                <span class="route-badge">${p.path}</span>

                    <div class="prop-row" style="margin-top:10px;">

                               onchange="Nav.linkExternal(Builder.activeElement, this.value)">
                    </div>
                </div>
            `;
            panel.insertAdjacentHTML('beforeend', linkHtml);
        }

        linkExternal(el, url) {
            el.dataset.linkType = 'external';
            el.dataset.route = url;
            this.showLinkToast('External URL');
        }

        generateSitemap() {
            // Logic for Section 14 (Export) to build sitemap.xml
            return this.pages.map(p => `https://yoursite.com${p.path}`).join('\n');
        }

        showLinkToast(dest) {
            const toast = document.getElementById('system-toast');
            toast.innerHTML = `Link Bound → <b>${dest}</b>`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    }

    const Nav = new NavEngine();
</script>

<script>
    /**
     * TYPEFACE KERNEL (Lines 27400 - 28000)
     * Handles dynamic Google Font injection and CSS variable mapping.
     */
    class TypefaceEngine {
        constructor() {
            this.popularFonts = ['Inter', 'Roboto', 'Playfair Display', 'JetBrains Mono', 'Montserrat'];
            this.loadedFonts = new Set(['Inter']);
        }

        /**
         * The "Billion Dollar" Font Loader
         * Uses the WebFont Loader API to ensure fonts don't "flash" (FOIT/FOUT).
         */
        loadFont(fontName) {
            if (this.loadedFonts.has(fontName)) return;

            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = `https://fonts.googleapis.com/css2?family=${fontName.replace(/ /g, '+')}:wght@400;700&display=swap`;
            document.head.appendChild(link);

            this.loadedFonts.add(fontName);
            this.showTypeToast(`Synthesizing ${fontName}...`);
        }

        applyTypography(prop, value) {
            const el = Builder.activeElement;
            if (!el) return;

            if (prop === 'fontFamily') {
                this.loadFont(value);
            }

            el.style[prop] = value;
            this.logTypography(prop, value);
        }

        renderTypeControls() {
            const panel = document.getElementById('props-render');
            if (!panel || !Builder.activeElement) return;

            const typeHtml = `
                <div class="control-group" style="border-top: 1px solid var(--glass-border); padding-top: 15px;">
                    <label class="control-label">Typography Master</label>
                    
                    <select class="prop-input" onchange="Type.applyTypography('fontFamily', this.value)">
                        ${this.popularFonts.map(f => `<option value="${f}">${f}</option>`).join('')}
                    </select>

                    <div class="type-scale-preview">
                        <div class="slider-group">
                            <span class="text-xs" style="width:60px">Size</span>
                            <input type="range" min="10" max="120" value="16" 
                                   oninput="Type.applyTypography('fontSize', this.value + 'px')">
                        </div>
                        <div class="slider-group">
                            <span class="text-xs" style="width:60px">Height</span>
                            <input type="range" min="0.8" max="2" step="0.1" value="1.5" 
                                   oninput="Type.applyTypography('lineHeight', this.value)">
                        </div>
                        <div class="slider-group">
                            <span class="text-xs" style="width:60px">Spacing</span>
                            <input type="range" min="-2" max="10" step="0.5" value="0" 
                                   oninput="Type.applyTypography('letterSpacing', this.value + 'px')">
                        </div>
                    </div>
                </div>
            `;
            panel.insertAdjacentHTML('beforeend', typeHtml);
        }

        showTypeToast(msg) {
            const toast = document.getElementById('system-toast');
            toast.innerHTML = `<i class="fa-solid fa-font"></i> ${msg}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        logTypography(p, v) {
            console.log(`%c[TYPE] %cSetting ${p} to ${v}`, "color: #7ee787", "color: #fff");
        }
    }

    const Type = new TypefaceEngine();
</script>

        animation: titanFadeInUp 0.8s var(--fast-glide) forwards;

<script>
    /**
     * MOTION KERNEL (Lines 28400 - 29000)
     * Manages scroll-based triggers and CSS keyframe generation.
     */
    class MotionEngine {
        constructor() {
            this.presets = {
                'fade-up': 'titanFadeInUp',
                'zoom-in': 'titanZoomIn',
                'reveal': 'titanReveal'
            };
            this.initObserver();
        }

        /**
         * The "Billion Dollar" Scroll Trigger
         * Uses IntersectionObserver for zero-lag performance on mobile.
         */
        initObserver() {
            this.observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                    }
                });
            }, { threshold: 0.1 });
        }

        applyAnimation(preset) {
            const el = Builder.activeElement;
            if (!el) return;

            el.classList.add('animate-on-scroll');
            el.dataset.animation = preset;
            this.observer.observe(el);
            
            this.showMotionToast(preset);
            this.playPreview(el);
        }

        playPreview(el) {
            el.classList.remove('is-visible');
            void el.offsetWidth; // Force reflow for animation restart
            el.classList.add('is-visible');
        }

        renderMotionControls() {
            const panel = document.getElementById('props-render');
            if (!panel || !Builder.activeElement) return;

            const motionHtml = `
                <div class="motion-panel animate-entrance">
                    <label class="control-label" style="color:var(--accent-vivid)">Motion Sequencer</label>
                    <div class="easing-preview">
                        <div class="easing-dot" id="ease-demo"></div>
                    </div>
                    <div class="prop-row">
                        <select class="prop-input" onchange="Motion.applyAnimation(this.value)">
                            <option value="">Select Animation...</option>
                            <option value="fade-up">Fade Slide Up</option>
                            <option value="zoom-in">Smooth Zoom</option>
                            <option value="reveal">Text Reveal</option>
                        </select>
                    </div>
                    <div class="timeline-track">
                        <div class="timeline-handle" style="left: 40%"></div>
                    </div>
                    <p class="text-xs" style="color:var(--n-500)">Duration: 0.8s (Standard Apple Glide)</p>
                </div>
            `;
            panel.insertAdjacentHTML('beforeend', motionHtml);
        }

        showMotionToast(type) {
            const toast = document.getElementById('system-toast');
            toast.innerHTML = `✨ Sequence [${type}] Bound to Scroll`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    }

    const Motion = new MotionEngine();
</script>

<script>
    /**
     * PRODUCTION KERNEL (Lines 29400 - 30000)
     * Orchestrates the final build and cloud distribution.
     */
    class LaunchpadEngine {
        constructor() {
            this.isLive = false;
            this.prodUrl = "";
        }

        /**
         * The "Billion Dollar" Deployment
         * Simulates minification, SEO optimization, and Edge distribution.
         */
        async deploy() {
            const overlay = document.getElementById('launch-screen');
            const bar = document.getElementById('launch-progress');
            const status = document.getElementById('launch-status');
            
            overlay.style.display = 'flex';
            
            const steps = [
                { p: 20, m: "Minifying Production Assets..." },
                { p: 45, m: "Compressing Image Buffers..." },
                { p: 70, m: "Generating Global Edge Cache..." },
                { p: 90, m: "Finalizing SSL Certificates..." },
                { p: 100, m: "Deployment Successful!" }
            ];

            for (const step of steps) {
                await new Promise(r => setTimeout(r, 800));
                bar.style.width = `${step.p}%`;
                status.innerText = step.m;
            }

            this.prodUrl = `https://webforge-preview.io/p/${Math.random().toString(36).substring(7)}`;
            this.isLive = true;
            this.showSuccess();
        }

        showSuccess() {
            const status = document.getElementById('launch-status');
            status.innerHTML = `

                <p style="color:white; margin:10px 0;">${this.prodUrl}</p>
                <button class="btn-titan" onclick="window.open(Launchpad.prodUrl)">Visit Website</button>
                <button class="btn-titan" style="background:none; border:1px solid #333; margin-top:10px;" onclick="location.reload()">Return to Dashboard</button>

        }
    }

    const Launchpad = new LaunchpadEngine();
</script>
